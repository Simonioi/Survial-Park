<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Park - 3D Map Viewer</title>
    
    <link rel="stylesheet" href="template/static/style.css">
</head>
<body>

    <div id="main-menu">
        <h1>SURVIVAL PARK</h1>
        <button class="menu-btn" onclick="lancerMenu()">▶ PLAY</button>
        <div class="map-mode-picker">
            <label for="map-mode">Map mode</label>
            <select id="map-mode">
                <option value="maze">Maze</option>
                <option value="kill-room">Kill Room</option>
            </select>
        </div>
        <button class="menu-btn" onclick="ScoreboardSystem.showLeaderboard()"> SCOREBOARD</button>
        <button class="menu-btn" onclick="alert('Options bientôt disponibles !')">⚙ OPTIONS</button>
    </div>

    <div id="game-ui" style="display: none;">
        <div class="container">
            <div class="canvas-wrapper" id="map2d-wrapper">
                <div class="label">2D Map View</div>
                <canvas id="target2"></canvas>
            </div>
            <div class="canvas-wrapper" id="map3d-wrapper">
                <div class="label horror-title">Survival Park</div>
                <canvas id="target"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <h3>Controls:</h3>
            <ul>
                <li><strong>Arrow Up/Down:</strong> Move forward/backward</li>
                <li><strong>Arrow Left/Right:</strong> Rotate player</li>
                <li><strong>Mouse Left Click / Space:</strong> Fire pistol</li>
            </ul>
            <div class="button-group">
                <button onclick="if(window.resetGame) resetGame(); window.location.href='index.html'" style="background-color: #8b0000;">Main Menu</button>
                <button onclick="if(window.SaveSystem && window.game) SaveSystem.saveGame(window.game); var currentMode=(window.game && window.game.mapMode)?window.game.mapMode:(localStorage.getItem('survivalPark_map_mode') || 'maze'); window.location.href='Dev mode/devMode.html?mapMode=' + encodeURIComponent(currentMode);" style="background-color: #cc6600;">🛠️ Dev Mode</button>
            </div>
        </div>
    </div>

    <div id="death-screen" style="display: none;">
        <h1>YOU DIED</h1>
        <button class="menu-btn" onclick="ScoreboardSystem.showNameEntryScreen({kills: window.lastGameStats?.kills || 0, wave: window.lastGameStats?.wave || 1})">SAVE SCORE</button>
        <button class="menu-btn" onclick="window.location.href='index.html'">Return to Main Menu</button>
    </div>

    <div id="name-entry-screen" style="display: none;">
        <div class="modal-content">
            <h1>YOUR SCORE</h1>
            <div class="score-stats">
                <div class="stat">
                    <span class="stat-label">Kills:</span>
                    <span class="stat-value" id="final-kills">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Waves:</span>
                    <span class="stat-value" id="final-wave">1</span>
                </div>
            </div>
            <div class="name-input-group">
                <label for="player-name-input">Enter your name (MAX 3 letters):</label>
                <input type="text" id="player-name-input" maxlength="3" placeholder="ABC" style="text-transform: uppercase;">
            </div>
            <div class="button-group" style="justify-content: center; gap: 10px;">
                <button class="menu-btn" onclick="ScoreboardSystem.submitNameAndSaveScore()" style="width: 200px;">SUBMIT</button>
                <button class="menu-btn" onclick="ScoreboardSystem.closeNameEntry()" style="width: 200px; background-color: #333;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="leaderboard-screen" style="display: none;">
        <div class="modal-content">
            <h1>TOP 10 SCORES</h1>
            <table id="leaderboard-table" class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Kills</th>
                        <th>Waves</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <div class="button-group" style="justify-content: center; gap: 10px; margin-top: 20px;">
                <button class="menu-btn" onclick="ScoreboardSystem.hideLeaderboard(); window.location.href='index.html'">Back to Menu</button>
            </div>
        </div>
    </div>

    <script src="game_gestion/logger.js"></script>
    <script src="map/helpers.js"></script>
    <script src="game_gestion/hp.js"></script>
    <script src="entity/player.js"></script>
    <script src="map/modules/floor.js"></script>
    <script src="map/modules/wall.js"></script>
    <script src="map/maze_gen.js"></script>
    <script src="game_gestion/survival/spawnSampler.js"></script>
    <script src="map/modes/mazeModeGenerator.js"></script>
    <script src="map/modes/killRoomModeGenerator.js"></script>
    <script src="entity/npc.js"></script>
    <script src="map/2D map/camera2D.js"></script>
    <script src="map/2D map/npc2D.js"></script>
    <script src="map/2D map/map2DRenderer.js"></script>
    <script src="game_gestion/weaponSystem.js"></script>
    <script src="game_gestion/weaponHud.js"></script>
    <script src="game_gestion/saveSystem.js"></script>
    <script src="game_gestion/survival/waveManager.js"></script>
    <script src="game_gestion/gameLoop.js"></script>
    <script src="map/map.js"></script>
    <script src="game_gestion/scoreboard.js"></script>

    <script src="game_gestion/menu.js"></script>
</body>
</html>
