<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Park - 3D Map Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #222;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        canvas {
            border: 2px solid #444;
        }
        
        #target2 {
            background-color: #fff;
        }
        
        .canvas-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        #map2d-wrapper {
            display: none;
        }
        
        #map3d-wrapper {
            display: flex;
        }
        
        .label {
            color: #fff;
            font-weight: bold;
            text-align: center;
        }
        
        .controls {
            color: #fff;
            margin-top: 10px;
            padding: 10px;
            background-color: #333;
            border-radius: 5px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .controls h3 {
            margin: 0;
            flex-basis: 100%;
        }
        
        .controls ul {
            margin: 5px 0;
            padding-left: 20px;
            flex: 1;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background-color: #0066cc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #0052a3;
        }
        
        button:active {
            background-color: #004080;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-wrapper" id="map2d-wrapper">
            <div class="label">2D Map View</div>
            <canvas id="target2"></canvas>
        </div>
        <div class="canvas-wrapper" id="map3d-wrapper">
            <div class="label">3D Perspective View</div>
            <canvas id="target"></canvas>
        </div>
    </div>
    
    <div class="controls">
        <h3>Controls:</h3>
        <ul>
            <li><strong>Arrow Up/Down:</strong> Move forward/backward</li>
            <li><strong>Arrow Left/Right:</strong> Rotate camera</li>
            <li><strong>Mouse Left Click / Space:</strong> Fire pistol</li>
        </ul>
        <div class="button-group">
            <button onclick="window.location.href='Dev mode/devMode.html'" style="background-color: #cc6600;">🛠️ Dev Mode</button>
        </div>
    </div>
    

    
    <!-- Load scripts in the correct order -->
    <!-- 1. Helpers must be loaded first (used by all modules) -->
    <script src="map/helpers.js"></script>
    
    <!-- 2. HP system from game_gestion (used by NPCs) -->
    <script src="game_gestion/hp.js"></script>
    
    <!-- 2.5. Save system for localStorage management -->
    <script src="game_gestion/saveSystem.js"></script>
    
    <!-- 3. Camera class (depends on helpers) -->
    <script src="map/camera.js"></script>
    
    <!-- 4. Floor module (depends on nothing) -->
    <script src="map/modules/floor.js"></script>
    
    <!-- 5. NPC class (depends on helpers and hp) -->
    <script src="map/npc.js"></script>
    
    <!-- 6. 2D Map rendering modules -->
    <script src="map/2D map/camera2D.js"></script>
    <script src="map/2D map/npc2D.js"></script>
    <script src="map/2D map/map2DRenderer.js"></script>

    <!-- 7. Weapon modules (in game_gestion) -->
    <script src="game_gestion/weaponSystem.js"></script>
    <script src="game_gestion/weaponHud.js"></script>
    
    <!-- 8. Game loop (depends on all modules, in game_gestion) -->
    <script src="game_gestion/gameLoop.js"></script>
    
    <!-- 9. Main entry point (coordinates everything) -->
    <script src="map/map.js"></script>
</body>
</html>
