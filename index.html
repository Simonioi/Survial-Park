<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Park - 3D Map Viewer</title>
    
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <div id="main-menu">
        <h1>SURVIVAL PARK</h1>
        <button class="menu-btn" onclick="startGame()">▶ PLAY</button>
        <button class="menu-btn" onclick="alert('Options bientôt disponibles !')">⚙ OPTIONS</button>
    </div>

    <div id="game-ui" style="display: none;">
        
        <div class="container">
            <div class="canvas-wrapper" id="map2d-wrapper">
                <div class="label">2D Map View</div>
                <canvas id="target2"></canvas>
            </div>
            <div class="canvas-wrapper" id="map3d-wrapper">
                <div class="label">3D Perspective View</div>
                <canvas id="target"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <h3>Controls:</h3>
            <ul>
                <li><strong>Arrow Up/Down:</strong> Move forward/backward</li>
                <li><strong>Arrow Left/Right:</strong> Rotate camera</li>
                <li><strong>Mouse Left Click / Space:</strong> Fire pistol</li>
            </ul>
            <div class="button-group">
                <button onclick="window.location.href='Dev mode/devMode.html'" style="background-color: #cc6600;">🛠️ Dev Mode</button>
            </div>
        </div>

    </div> <script src="map/helpers.js"></script>
    <script src="game_gestion/hp.js"></script>
    <script src="map/camera.js"></script>
    <script src="map/modules/floor.js"></script>
    <script src="map/npc.js"></script>
    <script src="map/2D map/camera2D.js"></script>
    <script src="map/2D map/npc2D.js"></script>
    <script src="map/2D map/map2DRenderer.js"></script>
    <script src="game_gestion/weaponSystem.js"></script>
    <script src="game_gestion/weaponHud.js"></script>
    <script src="game_gestion/saveSystem.js"></script>
    <script src="game_gestion/gameLoop.js"></script>
    <script src="map/map.js"></script>

    <script src="menu.js"></script>
</body>
</html>
