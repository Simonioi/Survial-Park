<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dev Mode Test</title>
</head>
<body>
    <h1>Script Loading Test</h1>
    <div id="status">Testing...</div>
    
    <script>
        const status = document.getElementById('status');
        const tests = [];
        
        // Test 1: Check if helpers loaded
        tests.push({
            name: 'helpers.js',
            passed: typeof helpers !== 'undefined' && typeof helpers.radians === 'function'
        });
        
        // Test 2: Check if Camera class loaded
        tests.push({
            name: 'camera.js',
            passed: typeof Camera === 'function'
        });
        
        // Test 3: Check if NPC class loaded
        tests.push({
            name: 'npc.js',
            passed: typeof NPC === 'function'
        });
        
        // Test 4: Check if 2D renderer loaded
        tests.push({
            name: '2D map modules',
            passed: typeof Camera2DRenderer === 'function' && typeof NPC2DRenderer === 'function'
        });
        
        // Test 5: Check if game loop loaded
        tests.push({
            name: 'gameLoop.js',
            passed: typeof createGameLoop === 'function'
        });
        
        // Test 6: Check if dev mode loaded
        tests.push({
            name: 'devMode.js',
            passed: typeof initDevMode === 'function'
        });
        
        // Test 7: Check if game object exists
        tests.push({
            name: 'game initialization',
            passed: typeof window.game !== 'undefined'
        });
        
        // Display results
        let html = '<h2>Test Results:</h2><ul>';
        let allPassed = true;
        tests.forEach(test => {
            const icon = test.passed ? '✅' : '❌';
            html += `<li>${icon} ${test.name}: ${test.passed ? 'PASSED' : 'FAILED'}</li>`;
            if (!test.passed) allPassed = false;
        });
        html += '</ul>';
        
        if (allPassed) {
            html += '<h3 style="color: green;">All tests passed! Dev mode should be working.</h3>';
        } else {
            html += '<h3 style="color: red;">Some tests failed. Check console for errors.</h3>';
        }
        
        status.innerHTML = html;
    </script>
    
    <!-- Load all the same scripts as devMode.html -->
    <script src="../helpers.js"></script>
    <script src="../camera.js"></script>
    <script src="../npc.js"></script>
    <script src="../2D map/camera2D.js"></script>
    <script src="../2D map/npc2D.js"></script>
    <script src="../2D map/map2DRenderer.js"></script>
    <script src="../gameLoop.js"></script>
    <script src="devMode.js"></script>
    <script src="../map.js"></script>
</body>
</html>
